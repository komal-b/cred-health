services:
  migrate:
    build:
      context: ./backend
    volumes:
      - ./backend/db:/app/db
    environment:
      - DB_PATH=/app/db/db.sqlite3
    command: sh -c "python manage.py migrate && python manage.py run_fhir_migration"

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/db:/app/db
    environment:
      - DB_PATH=/app/db/db.sqlite3
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend